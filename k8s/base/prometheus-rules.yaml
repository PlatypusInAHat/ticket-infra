apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ticketstage-alerts
  namespace: ticketstage
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: ticketstage-alerts
    app.kubernetes.io/part-of: ticketstage
spec:
  groups:
    - name: ticketstage.service.rules
      rules:
        - alert: TicketStageServiceHighErrorRate
          expr: |
            (
              sum by (service) (rate(ticketstage_http_request_errors_total[5m]))
              /
              clamp_min(sum by (service) (rate(ticketstage_http_requests_total[5m])), 1)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate on {{ $labels.service }}"
            description: "{{ $labels.service }} has more than 5% 5xx responses for 10 minutes."
        - alert: TicketStageBookingFailureRateHigh
          expr: |
            (
              sum(rate(ticketstage_http_request_errors_total{service="booking-service",route=~"/api/bookings.*|/api/payment.*"}[5m]))
              /
              clamp_min(sum(rate(ticketstage_http_requests_total{service="booking-service",route=~"/api/bookings.*|/api/payment.*"}[5m])), 1)
            ) > 0.03
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Booking/payment failure rate is increasing"
            description: "booking-service has more than 3% 5xx failures on booking or payment routes."
        - alert: TicketStagePaymentWebhookFailures
          expr: sum(rate(ticketstage_http_request_errors_total{service="booking-service",route=~"/api/payment/webhooks.*"}[5m])) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Payment webhook failures detected"
            description: "MoMo/VNPay webhook endpoints are returning 5xx responses."
        - alert: TicketStageBookingQueueBacklogHigh
          expr: ticketstage_queue_depth{service="booking-service",queue="booking-create",state="pending"} > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Booking queue backlog is high"
            description: "The booking creation queue has more than 100 pending requests for 5 minutes."
        - alert: TicketStageBookingQueueRejectedRequests
          expr: increase(ticketstage_queue_depth{service="booking-service",queue="booking-create",state="rejected"}[5m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Booking queue is rejecting requests"
            description: "The booking queue rejected requests in the last 5 minutes."
        - alert: TicketStageOutboxPendingTooLong
          expr: ticketstage_outbox_oldest_pending_age_seconds > 300
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Outbox pending event is too old on {{ $labels.service }}"
            description: "The oldest pending outbox event has been waiting for more than 5 minutes."
        - alert: TicketStageDatabaseLatencyHigh
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, service) (rate(ticketstage_dependency_latency_seconds_bucket{type="database"}[5m]))
            ) > 0.25
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Database latency is high on {{ $labels.service }}"
            description: "MongoDB health-check p95 latency is above 250ms for 10 minutes."
        - alert: TicketStageHpaAtMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="ticketstage"}
            >=
            kube_horizontalpodautoscaler_spec_max_replicas{namespace="ticketstage"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "HPA is at max replicas for {{ $labels.horizontalpodautoscaler }}"
            description: "The HPA has reached its configured max replicas for 10 minutes."
        - alert: TicketStagePodRestartLoop
          expr: increase(kube_pod_container_status_restarts_total{namespace="ticketstage"}[10m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod restart loop in ticketstage"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarted more than 3 times in 10 minutes."
