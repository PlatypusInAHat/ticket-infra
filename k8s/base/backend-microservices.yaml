  replicas: 2
  selector:
    matchLabels: *notificationLabels
  template:
    metadata:
      labels: *notificationLabels
    spec:
      serviceAccountName: notification-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: *notificationLabels
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: *notificationLabels
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: *notificationLabels
      containers:
        - name: notification-service
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ticketstage-notification-service:0.0.0-placeholder
          imagePullPolicy: Always
          command: ["npm", "run", "start:notification-service"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5105
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: ticketstage-observability-config
            - secretRef:
                name: ticketstage-secrets
          env:
            - name: NOTIFICATION_SERVICE_PORT
              value: "5105"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: NODE_ENV
            - name: SERVICE_MODE
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: SERVICE_MODE
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: FRONTEND_URL
            - name: PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: PUBLIC_API_URL
            - name: EVENT_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EVENT_EXCHANGE
            - name: EVENT_CONSUMER_PREFETCH
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EVENT_CONSUMER_PREFETCH
            - name: EVENT_RETRY_DELAY_MS
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EVENT_RETRY_DELAY_MS
            - name: EVENT_MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EVENT_MAX_RETRIES
            - name: EMAIL_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_PROVIDER
            - name: EMAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_FROM
            - name: EMAIL_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_FROM_NAME
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_PORT
            - name: EMAIL_SECURE
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_SECURE
            - name: EMAIL_WORKER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_WORKER_ENABLED
            - name: EMAIL_WORKER_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_WORKER_INTERVAL_MS
            - name: EMAIL_WORKER_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: EMAIL_WORKER_BATCH_SIZE
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5105
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5105
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 300m
              memory: 384Mi
              ephemeral-storage: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ticketstage
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: ticketstage
spec:
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: http
      port: 5105
      targetPort: 5105
