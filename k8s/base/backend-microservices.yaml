apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticketstage
  labels: &gatewayLabels
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ticketstage
spec:
  replicas: 2
  selector:
    matchLabels: *gatewayLabels
  template:
    metadata:
      labels: *gatewayLabels
    spec:
      serviceAccountName: api-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: *gatewayLabels
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: *gatewayLabels
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: *gatewayLabels
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ticketstage-api-gateway:0.0.0-placeholder
          imagePullPolicy: Always
          command: ["npm", "run", "start:gateway"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: ticketstage-observability-config
            - secretRef:
                name: ticketstage-secrets
          env:
            - name: GATEWAY_PORT
              value: "5000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: NODE_ENV
            - name: SERVICE_MODE
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: SERVICE_MODE
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: FRONTEND_URL
            - name: GATEWAY_UPSTREAM_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: GATEWAY_UPSTREAM_TIMEOUT_MS
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: AUTH_SERVICE_URL
            - name: CATALOG_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: CATALOG_SERVICE_URL
            - name: BOOKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: BOOKING_SERVICE_URL
            - name: CHECKIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: CHECKIN_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketstage-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticketstage
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ticketstage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 5000
      targetPort: 5000
