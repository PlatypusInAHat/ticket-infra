apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticketstage
  labels: &gatewayLabels
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ticketstage
spec:
  replicas: 2
  selector:
    matchLabels: *gatewayLabels
  template:
    metadata:
      labels: *gatewayLabels
    spec:
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ticketstage-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "start:gateway"]
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ticketstage-config
            - secretRef:
                name: ticketstage-secrets
          env:
            - name: GATEWAY_PORT
              value: "5000"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticketstage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
