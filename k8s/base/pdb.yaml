apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: ticketstage
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: booking-service
  namespace: ticketstage
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-service
