apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketstage-config
  namespace: ticketstage
data:
  NODE_ENV: "production"
  SERVICE_MODE: "microservice"
  EVENT_EXCHANGE: "ticket-booking.events"
  FRONTEND_URL: "https://www.ticketstage.example.com"
  PUBLIC_API_URL: "https://api.ticketstage.example.com"
  GATEWAY_UPSTREAM_TIMEOUT_MS: "10000"
  AUTH_SERVICE_URL: "auth-service:5101"
  CATALOG_SERVICE_URL: "catalog-service:5102"
  BOOKING_SERVICE_URL: "booking-service:5103"
  CHECKIN_SERVICE_URL: "checkin-service:5104"
  NOTIFICATION_SERVICE_URL: "notification-service:5105"
  JWT_ACCESS_EXPIRE: "15m"
  JWT_REFRESH_EXPIRE: "24h"
  PASSWORD_HASH_ROUNDS: "12"
  MIN_PASSWORD_LENGTH: "8"
  BOOKING_HOLD_MINUTES: "15"
  EVENT_REMINDER_WORKER_ENABLED: "true"
  EVENT_REMINDER_INTERVAL_MS: "900000"
  EVENT_REMINDER_WINDOW_HOURS: "24"
  EVENT_REMINDER_BATCH_SIZE: "50"
  BOOKING_QUEUE_ENABLED: "true"
  BOOKING_QUEUE_CONCURRENCY: "5"
  BOOKING_QUEUE_MAX_SIZE: "500"
  BOOKING_QUEUE_WAIT_TIMEOUT_MS: "30000"
  BOOKING_QUEUE_LEASE_MS: "300000"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_STORE: "mongo"
  BOOKING_CREATE_RATE_LIMIT_WINDOW_MS: "60000"
  BOOKING_CREATE_RATE_LIMIT_MAX: "8"
  PAYMENT_RATE_LIMIT_WINDOW_MS: "60000"
  PAYMENT_RATE_LIMIT_MAX: "12"
  EVENT_CONSUMER_PREFETCH: "10"
  EVENT_RETRY_DELAY_MS: "15000"
  EVENT_MAX_RETRIES: "5"
  OUTBOX_ENABLED: "true"
  OUTBOX_PUBLISH_INTERVAL_MS: "5000"
  OUTBOX_BATCH_SIZE: "50"
  EMAIL_PROVIDER: "ses-smtp"
  EMAIL_FROM: "no-reply@ticketstage.example.com"
  EMAIL_FROM_NAME: "TicketStage"
  EMAIL_PORT: "587"
  EMAIL_SECURE: "false"
  EMAIL_WORKER_ENABLED: "true"
  EMAIL_WORKER_INTERVAL_MS: "5000"
  EMAIL_WORKER_BATCH_SIZE: "10"
