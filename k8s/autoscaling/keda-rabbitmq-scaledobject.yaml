apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
  namespace: ticketstage
spec:
  secretTargetRef:
    - parameter: host
      name: ticketstage-secrets
      key: EVENT_BROKER_URL
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: booking-service-rabbitmq
  namespace: ticketstage
spec:
  scaleTargetRef:
    name: booking-service
  minReplicaCount: 3
  maxReplicaCount: 60
  pollingInterval: 10
  cooldownPeriod: 300
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        queueName: booking.checkout
        mode: QueueLength
        value: "50"
      authenticationRef:
        name: rabbitmq-trigger-auth
