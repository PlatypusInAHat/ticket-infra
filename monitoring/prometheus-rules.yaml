# Reference copy only.
# The deployable PrometheusRule is managed by kustomize at:
# k8s/base/prometheus-rules.yaml
#
# Keep this file for operators who want to review alert intent without reading
# the full Kubernetes base overlay.
alerts:
  - TicketStageServiceHighErrorRate
  - TicketStageBookingFailureRateHigh
  - TicketStagePaymentWebhookFailures
  - TicketStageBookingQueueBacklogHigh
  - TicketStageBookingQueueRejectedRequests
  - TicketStageOutboxPendingTooLong
  - TicketStageDatabaseLatencyHigh
  - TicketStageHpaAtMaxReplicas
  - TicketStagePodRestartLoop
