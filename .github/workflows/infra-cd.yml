name: Infrastructure CI/CD

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'aws/**'
      - 'cloudflare/**'
      - 'k8s/**'
      - 'argocd/**'
      - 'monitoring/**'
      - 'dependency-check-suppressions.xml'
      - 'sonar-project.properties'
      - '.github/workflows/infra-cd.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'aws/**'
      - 'cloudflare/**'
      - 'k8s/**'
      - 'argocd/**'
      - 'monitoring/**'
      - 'dependency-check-suppressions.xml'
      - 'sonar-project.properties'
      - '.github/workflows/infra-cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      layer:
        description: 'Terraform layer to manage. Use all to apply in order or destroy in reverse order.'
        required: true
        default: '00-networking'
        type: choice
        options:
          - '00-networking'
          - '01-kubernetes'
          - '02-data'
          - '03-storage'
          - '04-observability'
          - 'cloudflare'
          - 'all'
      action:
        description: 'Terraform Action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive .

      - name: Terraform Validate Layers
        run: |
          set -euo pipefail

          for dir in \
            aws/terraform/layers/00-networking \
            aws/terraform/layers/01-kubernetes \
            aws/terraform/layers/02-data \
            aws/terraform/layers/03-storage \
            aws/terraform/layers/04-observability \
            cloudflare; do
            echo "::group::Validate ${dir}"
            terraform -chdir="${dir}" init -backend=false
            terraform -chdir="${dir}" validate
            echo "::endgroup::"
          done

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Render Kubernetes Manifests
        run: |
          kubectl kustomize k8s/base >/dev/null
          kubectl kustomize k8s/overlays/dev >/dev/null
          kubectl kustomize k8s/overlays/prod >/dev/null
          kubectl kustomize argocd/bootstrap >/dev/null
          kubectl kustomize argocd/applications >/dev/null

  audit:
    name: Audit Code And IaC
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Actions Lint
        uses: raven-actions/actionlint@v2

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform And Kubernetes Security Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Trivy Filesystem Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Checkov IaC Policy Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,github_actions
          quiet: true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ticket-infra
          path: .
          format: HTML
          out: dependency-check-report
          args: >
            --enableExperimental
            --failOnCVSS 7
            --suppression dependency-check-suppressions.xml

      - name: Upload OWASP Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: dependency-check-report
          if-no-files-found: ignore

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    env: &terraform_env
      TF_VAR_FILE: "../../environments/${{ github.event.inputs.environment }}/terraform.tfvars"
      TF_INPUT: "false"
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION }}
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
      TF_VAR_terraform_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_terraform_state_region: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION }}
      TF_VAR_mongodb_public_key: ${{ secrets.MONGODB_PUBLIC_KEY }}
      TF_VAR_mongodb_private_key: ${{ secrets.MONGODB_PRIVATE_KEY }}
      TF_VAR_mongodb_org_id: ${{ secrets.MONGODB_ORG_ID }}
      TF_VAR_mongodb_username: ${{ secrets.MONGODB_USERNAME }}
      TF_VAR_mongodb_password: ${{ secrets.MONGODB_PASSWORD }}
      TF_VAR_mq_admin_username: ${{ secrets.MQ_ADMIN_USERNAME }}
      TF_VAR_mq_admin_password: ${{ secrets.MQ_ADMIN_PASSWORD }}
      TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_CONNECTION_STRING }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_rabbitmq_username: ${{ secrets.RABBITMQ_USERNAME }}
      TF_VAR_rabbitmq_password: ${{ secrets.RABBITMQ_PASSWORD }}
      TF_VAR_rabbitmq_url: ${{ secrets.RABBITMQ_URL }}
      TF_VAR_eks_service_account_role_arn: ${{ secrets.EKS_SERVICE_ACCOUNT_ROLE_ARN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      CLOUDFLARE_DNS_RECORDS: ${{ secrets.CLOUDFLARE_DNS_RECORDS }}
    steps:
      - name: Check Required Secrets
        shell: bash
        run: |
          missing=()
          require() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          }

          require AWS_ACCESS_KEY_ID "${AWS_ACCESS_KEY_ID}"
          require AWS_SECRET_ACCESS_KEY "${AWS_SECRET_ACCESS_KEY}"
          require AWS_REGION "${AWS_REGION}"
          require TF_STATE_BUCKET "${TF_STATE_BUCKET}"
          require TF_STATE_REGION "${TF_STATE_REGION}"
          require TF_LOCK_TABLE "${TF_LOCK_TABLE}"

          if [ "${{ github.event.inputs.layer }}" = "all" ]; then
            target_layers="00-networking 01-kubernetes 02-data 03-storage 04-observability cloudflare"
          else
            target_layers="${{ github.event.inputs.layer }}"
          fi

          for target_layer in ${target_layers}; do
            case "${target_layer}" in
              02-data)
                require MONGODB_PUBLIC_KEY "${TF_VAR_mongodb_public_key}"
                require MONGODB_PRIVATE_KEY "${TF_VAR_mongodb_private_key}"
                require MONGODB_ORG_ID "${TF_VAR_mongodb_org_id}"
                require MONGODB_USERNAME "${TF_VAR_mongodb_username}"
                require MONGODB_PASSWORD "${TF_VAR_mongodb_password}"
                require MQ_ADMIN_USERNAME "${TF_VAR_mq_admin_username}"
                require MQ_ADMIN_PASSWORD "${TF_VAR_mq_admin_password}"
                ;;
              03-storage)
                require MONGODB_CONNECTION_STRING "${TF_VAR_mongodb_connection_string}"
                require MONGODB_USERNAME "${TF_VAR_mongodb_username}"
                require JWT_SECRET "${TF_VAR_jwt_secret}"
                require RABBITMQ_USERNAME "${TF_VAR_rabbitmq_username}"
                require RABBITMQ_PASSWORD "${TF_VAR_rabbitmq_password}"
                require RABBITMQ_URL "${TF_VAR_rabbitmq_url}"
                require EKS_SERVICE_ACCOUNT_ROLE_ARN "${TF_VAR_eks_service_account_role_arn}"
                ;;
              cloudflare)
                require CLOUDFLARE_API_TOKEN "${TF_VAR_cloudflare_api_token}"
                require CLOUDFLARE_ZONE_ID "${TF_VAR_cloudflare_zone_id}"
                ;;
            esac
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

  terraform_00_networking:
    name: Terraform 00 Networking
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '00-networking') }}
    needs: preflight
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 00-networking
        run: |
          terraform -chdir=aws/terraform/layers/00-networking init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/00-networking/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan 00-networking
        run: terraform -chdir=aws/terraform/layers/00-networking plan -var-file="${TF_VAR_FILE}"

      - name: Terraform Apply 00-networking
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=aws/terraform/layers/00-networking apply -var-file="${TF_VAR_FILE}" -auto-approve

  terraform_01_kubernetes:
    name: Terraform 01 Kubernetes
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '01-kubernetes') }}
    needs:
      - preflight
      - terraform_00_networking
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 01-kubernetes
        run: |
          terraform -chdir=aws/terraform/layers/01-kubernetes init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/01-kubernetes/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan 01-kubernetes
        run: terraform -chdir=aws/terraform/layers/01-kubernetes plan -var-file="${TF_VAR_FILE}"

      - name: Terraform Apply 01-kubernetes
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=aws/terraform/layers/01-kubernetes apply -var-file="${TF_VAR_FILE}" -auto-approve

  terraform_02_data:
    name: Terraform 02 Data
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '02-data') }}
    needs:
      - preflight
      - terraform_01_kubernetes
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 02-data
        run: |
          terraform -chdir=aws/terraform/layers/02-data init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/02-data/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan 02-data
        run: terraform -chdir=aws/terraform/layers/02-data plan -var-file="${TF_VAR_FILE}"

      - name: Terraform Apply 02-data
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=aws/terraform/layers/02-data apply -var-file="${TF_VAR_FILE}" -auto-approve

  terraform_03_storage:
    name: Terraform 03 Storage
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '03-storage') }}
    needs:
      - preflight
      - terraform_02_data
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 03-storage
        run: |
          terraform -chdir=aws/terraform/layers/03-storage init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/03-storage/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan 03-storage
        run: terraform -chdir=aws/terraform/layers/03-storage plan -var-file="${TF_VAR_FILE}"

      - name: Terraform Apply 03-storage
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=aws/terraform/layers/03-storage apply -var-file="${TF_VAR_FILE}" -auto-approve

  terraform_04_observability:
    name: Terraform 04 Observability
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '04-observability') }}
    needs:
      - preflight
      - terraform_03_storage
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 04-observability
        run: |
          terraform -chdir=aws/terraform/layers/04-observability init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/04-observability/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan 04-observability
        run: terraform -chdir=aws/terraform/layers/04-observability plan -var-file="${TF_VAR_FILE}"

      - name: Terraform Apply 04-observability
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=aws/terraform/layers/04-observability apply -var-file="${TF_VAR_FILE}" -auto-approve

  terraform_cloudflare:
    name: Terraform Cloudflare
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == 'cloudflare') }}
    needs:
      - preflight
      - terraform_04_observability
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Setup Optional Cloudflare DNS Records
        shell: bash
        run: |
          if [ -n "${CLOUDFLARE_DNS_RECORDS}" ]; then
            {
              echo "TF_VAR_dns_records<<EOF"
              echo "${CLOUDFLARE_DNS_RECORDS}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Terraform Init Cloudflare
        run: |
          terraform -chdir=cloudflare init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/cloudflare/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan Cloudflare
        run: terraform -chdir=cloudflare plan

      - name: Terraform Apply Cloudflare
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=cloudflare apply -auto-approve

  destroy_cloudflare:
    name: Destroy Cloudflare
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == 'cloudflare') }}
    needs: preflight
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Setup Optional Cloudflare DNS Records
        shell: bash
        run: |
          if [ -n "${CLOUDFLARE_DNS_RECORDS}" ]; then
            {
              echo "TF_VAR_dns_records<<EOF"
              echo "${CLOUDFLARE_DNS_RECORDS}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Terraform Init Cloudflare
        run: |
          terraform -chdir=cloudflare init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/cloudflare/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy Cloudflare
        run: terraform -chdir=cloudflare destroy -auto-approve

  destroy_04_observability:
    name: Destroy 04 Observability
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '04-observability') }}
    needs:
      - preflight
      - destroy_cloudflare
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 04-observability
        run: |
          terraform -chdir=aws/terraform/layers/04-observability init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/04-observability/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy 04-observability
        run: terraform -chdir=aws/terraform/layers/04-observability destroy -var-file="${TF_VAR_FILE}" -auto-approve

  destroy_03_storage:
    name: Destroy 03 Storage
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && (github.event.inputs.layer == 'all' || github.event.inputs.layer == '03-storage') }}
    needs:
      - preflight
      - destroy_04_observability
    env: *terraform_env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init 03-storage
        run: |
          terraform -chdir=aws/terraform/layers/03-storage init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ github.event.inputs.environment }}/03-storage/terraform.tfstate" \
